version: 2

project_name: me

before:
  hooks:
    - go mod download

builds:
  - id: me
    main: ./cmd/me
    binary: me
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X github.com/Olian04/go-me/cmd/me/version.Version={{ .Tag }}
      - -X github.com/Olian04/go-me/cmd/me/version.Revision={{ .Commit }}
      - -X github.com/Olian04/go-me/cmd/me/version.BuildTime={{ .Env.ME_BUILD_TIME }}

archives:
  - id: me
    formats: [binary]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    ids:
      - me

checksum:
  name_template: checksums.txt

sboms:
  - id: me
    artifacts: binary
    ids:
      - me
    disable: false

changelog:
  use: git
  sort: asc
  abbrev: 7
  filters:
    exclude:
      - "(?i)^merge "
      - "(?i)^merge pull request"
      - "^chore\\(release\\):"
      - "^ci:"
      - "^docs:"

brews:
  - name: me
    ids:
      - me
    repository:
      owner: "{{ .Env.HOMEBREW_TAP_OWNER }}"
      name: "{{ .Env.HOMEBREW_TAP_NAME }}"
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/Olian04/go-me"
    description: "me CLI"
    license: "AGPL-3.0-only"
    commit_author:
      name: me release bot
      email: 41898282+github-actions[bot]@users.noreply.github.com

scoops:
  - name: me
    ids:
      - me
    repository:
      owner: "{{ .Env.SCOOP_BUCKET_OWNER }}"
      name: "{{ .Env.SCOOP_BUCKET_NAME }}"
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    homepage: "https://github.com/Olian04/go-me"
    description: "me CLI"
    license: "AGPL-3.0-only"
    commit_author:
      name: me release bot
      email: 41898282+github-actions[bot]@users.noreply.github.com

winget:
  - name: me
    ids:
      - me
    publisher: Olian04
    short_description: me CLI
    license: AGPL-3.0-only
    homepage: "https://github.com/Olian04/go-me"
    repository:
      owner: "{{ .Env.WINGET_REPO_OWNER }}"
      name: "{{ .Env.WINGET_REPO_NAME }}"
      branch: main
      token: "{{ .Env.WINGET_TOKEN }}"

nfpms:
  - id: me
    package_name: me
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    description: me CLI
    maintainer: Olian04
    homepage: "https://github.com/Olian04/go-me"
    license: AGPL-3.0-only
    bindir: /usr/local/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/licenses/me/LICENSE
      - src: ./goreleaser/man/me.1
        dst: /usr/share/man/man1/me.1
      - src: ./goreleaser/man/me-whoami.1
        dst: /usr/share/man/man1/me-whoami.1

release:
  prerelease: auto
  name_template: "{{ .Env.RELEASE_NAME }}"
  header: |
    {{ .Env.RELEASE_BODY }}

  footer: |
    ## Downloads

    | Asset | Description |
    |-------|-------------|
    | `checksums.txt` | SHA256 checksums for all files in this release |
    | `me_*` | Per-OS/arch binaries |
    | `*.sbom.json` | SPDX JSON SBOM per binary ([Syft](https://github.com/anchore/syft)) |
    | Homebrew formula PR | Generated by GoReleaser (`brews`) |
    | Scoop manifest PR | Generated by GoReleaser (`scoops`) |
    | winget manifest PR | Generated by GoReleaser (`winget`) |
    | `.deb`/`.rpm`/`.apk`/`.pkg.tar.zst` | Linux packages from `nfpms` |
