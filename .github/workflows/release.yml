name: Release

run-name: Release ${{ inputs.version }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version: X.Y or X.Y.Z (release) or X.Y-Z / X.Y.Z-Z (prerelease). Optional leading v."
        required: true
        type: string
      prerelease:
        description: "Mark this release as a prerelease"
        required: false
        default: true
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version format and extract
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          PRERELEASE="${{ inputs.prerelease }}"
          if [ "$PRERELEASE" = "true" ]; then
            if ! echo "$VERSION" | grep -qE '^v?[0-9]+\.[0-9]+(\.[0-9]+)?-[0-9]+$'; then
              echo "::error::Prerelease version must match X.Y-Z or X.Y.Z-Z (optional leading v). Got: $VERSION"
              exit 1
            fi
          else
            if ! echo "$VERSION" | grep -qE '^v?[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
              echo "::error::Release version must match X.Y or X.Y.Z (optional leading v). Got: $VERSION"
              exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "$PRERELEASE" = "true" ]; then
            echo "release_name=Prerelease ${VERSION}" >> "$GITHUB_OUTPUT"
            echo "release_body=**This is a prerelease** of me (${VERSION}). Subject to change." >> "$GITHUB_OUTPUT"
          else
            echo "release_name=Release ${VERSION}" >> "$GITHUB_OUTPUT"
            echo "release_body=Official release ${VERSION} of **me**." >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Record build timestamp and release intro
        run: |
          echo "ME_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${{ steps.version.outputs.release_name }}" >> "$GITHUB_ENV"
          {
            echo "RELEASE_BODY<<EOF"
            echo "${{ steps.version.outputs.release_body }}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Set package manager repository metadata
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "HOMEBREW_TAP_OWNER=${OWNER}" >> "$GITHUB_ENV"
          echo "HOMEBREW_TAP_NAME=homebrew-tap" >> "$GITHUB_ENV"
          echo "SCOOP_BUCKET_OWNER=${OWNER}" >> "$GITHUB_ENV"
          echo "SCOOP_BUCKET_NAME=scoop-bucket" >> "$GITHUB_ENV"
          echo "WINGET_REPO_OWNER=${OWNER}" >> "$GITHUB_ENV"
          echo "WINGET_REPO_NAME=winget-pkgs" >> "$GITHUB_ENV"

      - name: Create and push release tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git fetch --prune --tags origin
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag '$VERSION' already exists. Refusing to overwrite."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION" "${GITHUB_SHA}"
          git push origin "refs/tags/$VERSION"

      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --verbose --config goreleaser/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
          ME_BUILD_TIME: ${{ env.ME_BUILD_TIME }}
          RELEASE_NAME: ${{ env.RELEASE_NAME }}
          RELEASE_BODY: ${{ env.RELEASE_BODY }}
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.version }}
          HOMEBREW_TAP_OWNER: ${{ env.HOMEBREW_TAP_OWNER }}
          HOMEBREW_TAP_NAME: ${{ env.HOMEBREW_TAP_NAME }}
          SCOOP_BUCKET_OWNER: ${{ env.SCOOP_BUCKET_OWNER }}
          SCOOP_BUCKET_NAME: ${{ env.SCOOP_BUCKET_NAME }}
          WINGET_REPO_OWNER: ${{ env.WINGET_REPO_OWNER }}
          WINGET_REPO_NAME: ${{ env.WINGET_REPO_NAME }}

      - name: Post-release verification checklist
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          {
            echo "## Release summary"
            echo ""
            echo "- Version: \`$VERSION\`"
            echo "- Triggered by: \`${{ github.actor }}\`"
            echo "- Environment: \`release\`"
            echo ""
            echo "## Verify"
            echo ""
            echo "- [ ] GitHub Release exists for tag \`$VERSION\` and includes binaries + \`checksums.txt\`"
            echo "- [ ] SBOM artifacts present"
            echo "- [ ] Homebrew tap update PR/commit created"
            echo "- [ ] Scoop bucket update PR/commit created"
            echo "- [ ] winget manifest update PR created"
          } >> "$GITHUB_STEP_SUMMARY"
